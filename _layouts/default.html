<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.svg' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="wordmark">
        <img src="{{ '/assets/favicon.svg' | relative_url }}" alt="" class="wordmark__mark">
        <span class="wordmark__text">sascha</span>
      </a>
<nav class="site-nav" aria-label="Primary">
  <a href="{{ '/about' | relative_url }}">about</a>
  <a href="{{ '/work' | relative_url }}">projects</a>
  <a href="{{ '/writing' | relative_url }}">writing</a>
  <a href="{{ '/blog/' | relative_url }}">blog</a>
  <a href="{{ '/blog/travel' | relative_url }}">travel</a>
  
</nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="meta">© {{ site.time | date: '%Y' }} · sasha · data, fairness, impact</p>
    </div>
  </footer>
</body>
</html>
