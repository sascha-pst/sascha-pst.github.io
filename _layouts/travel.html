---
layout: default
---
<article class="travel-post">
  <header class="travel-post__header">
    <p class="meta">
      {{ page.date | date: "%B %Y" }}
      {% if page.location %} · {{ page.location }}{% endif %}
    </p>
    <h1 class="travel-post__title display">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="lede travel-post__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  {% if page.cover_image %}
    <figure class="travel-post__cover">
      <img src="{{ page.cover_image | relative_url }}" alt="{{ page.cover_alt | default: page.title }}">
    </figure>
  {% endif %}

  <div class="travel-post__content post-content">
    {{ content }}
  </div>

  <footer class="travel-post__footer">
    <hr>
    <p class="back-link"><a href="{{ '/blog/travel/' | relative_url }}">← Back to the spiral</a></p>
  </footer>
</article>
