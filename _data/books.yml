{%- assign sorted = site.books | sort: 'rating' | reverse -%}
{%- assign total = sorted.size -%}
{%- assign half = total | divided_by: 2 | plus: 1 -%}

<div class="bookshelf">
  {%- for row_idx in (0..1) -%}
    {%- assign offset = row_idx | times: half -%}
    <div class="shelf-row">
      <div class="books">
        {%- for book in sorted offset: offset limit: half -%}
          {%- capture color -%}{%- include book-color.liquid book=book -%}{%- endcapture -%}
          {%- assign title_len = book.title | size -%}
          {%- assign h = title_len | times: 2 | plus: 150 -%}
          {%- assign w = forloop.index0 | modulo: 4 | times: 4 | plus: 36 -%}
          <button
            type="button"
            class="book book--{{ color }}"
            style="--i: {{ forloop.index0 }}; width: {{ w }}px; height: {{ h }}px;"
            data-book-id="{{ book.slug }}"
            aria-expanded="false"
            aria-controls="detail-row-{{ row_idx }}">
            <span class="book__spine">{{ book.title }}</span>
          </button>
        {%- endfor -%}
      </div>
      <div class="shelf-board"></div>
      <div class="book__detail" id="detail-row-{{ row_idx }}" role="region" aria-live="polite"></div>
    </div>
  {%- endfor -%}
</div>

<script type="application/json" id="books-data">
[
{%- for book in sorted -%}
  {%- capture color -%}{%- include book-color.liquid book=book -%}{%- endcapture -%}
  {
    "id": {{ book.slug | jsonify }},
    "title": {{ book.title | jsonify }},
    "subtitle": {{ book.subtitle | default: "" | jsonify }},
    "author": {{ book.author | jsonify }},
    "year": {{ book.year_published }},
    "cover": {{ book.cover | jsonify }},
    "link": {{ book.link | jsonify }},
    "rating": {{ book.rating }},
    "tags": {{ book.tags | jsonify }},
    "color": {{ color | strip | jsonify }}
  }{% unless forloop.last %},{% endunless %}
{%- endfor -%}
]
</script>
