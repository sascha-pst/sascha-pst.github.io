# ============================================================
# Site config
# ============================================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  
title: Sasha Schaps
tagline: Data, fairness, impact.
description: >
  Writing and selected projects on data science, AI,
  and public-interest tech. Currently studying at UC Berkeley.
url: https://sascha-pst.github.io
author: Sasha Schaps
social:
  name: Sasha Schaps
  links:
    - https://linkedin.com/in/sashaschaps
    - https://github.com/sascha-pst
logo: /assets/favicon.svg

# ---------- Build settings ----------
markdown: kramdown
highlighter: rouge

sass:
  style: compressed
  sourcemap: never

# ---------- Collections ----------
collections:
  projects:
    output: true
    permalink: /work/:path/
  travel:
    output: true
    permalink: /blog/travel/:path/
  books:
    output: true
    permalink: /books/:path/
# ---------- Defaults ----------
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: travel
    values:
      layout: travel
  - scope:
      path: ""
      type: books
    values:
      layout: book

# ---------- What Jekyll should not copy to _site ----------
exclude:
  - Gemfile
  - Gemfile.lock
  - .jekyll-cache
  - .sass-cache
  - node_modules
