# ============================================================
# Site config
# ============================================================

title: Sasha
description: (WIP) Data scientist · AI fairness research · ex-Meta.
author: Sasha Schaps
email: sashaschaps@berkeley.edu
url: "https://sascha-pst.github.io"
baseurl: ""

# ---------- Build settings ----------
markdown: kramdown
highlighter: rouge

sass:
  style: compressed
  sourcemap: never

# ---------- Plugins (all GitHub Pages safe) ----------
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ---------- Collections ----------
collections:
  projects:
    output: true
    permalink: /work/:path/
  travel:
    output: true
    permalink: /blog/travel/:path/
  blog:
    output: true
    permalink: /blog/:year/:slug/
  books:
    output: true
    permalink: /books/:path/
# ---------- Defaults ----------
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: travel
    values:
      layout: travel
  - scope:
      path: ""
      type: books
    values:
      layout: book

# ---------- What Jekyll should not copy to _site ----------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - .jekyll-cache
  - .sass-cache
  - node_modules
