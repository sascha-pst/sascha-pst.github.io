<!-- ============================================================ -->
<!-- FAVICONS · Stamped Persimmon · v2 identity                   -->
<!-- Paste this inside <head> in _includes/head.html              -->
<!-- ============================================================ -->

<!-- Modern browsers: SVG favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicons/favicon.svg' | relative_url }}">

<!-- PNG fallbacks for older browsers -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicons/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicons/favicon-16.png' | relative_url }}">

<!-- Legacy ICO fallback (Safari, bookmarks, very old browsers) -->
<link rel="shortcut icon" href="{{ '/assets/favicons/favicon.ico' | relative_url }}">

<!-- iOS home screen -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicons/apple-touch-icon.png' | relative_url }}">

<!-- Android / PWA -->
<link rel="manifest" href="{{ '/assets/favicons/site.webmanifest' | relative_url }}">

<!-- Mobile browser chrome color (matches persimmon brand) -->
<meta name="theme-color" content="#E65100">
