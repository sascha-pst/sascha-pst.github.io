<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sascha ps Tejada</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

  :root {
    --orange: #FF8C42;
    --orange-glow: #FFB347;
    --fuchsia: #FF6EB4;
    --violet: #C77DFF;
    --cream: #FFF5E6;
    --baby-blue: #B8E0FF;
    --pink-pastel: #FFD6E8;
    --navy: #0D0A1A;
    --navy-mid: #130F24;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Nunito', sans-serif;
  }

  /* ─── INFINITY ROOM LAYERS ─── */
  .infinity-bg {
    position: fixed; inset: 0;
    perspective: 600px;
    transform-style: preserve-3d;
  }

  .mirror-layer {
    position: absolute; inset: -20%;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(199,125,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 80% at 20% 30%, rgba(255,110,180,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(255,140,66,0.06) 0%, transparent 60%),
      var(--navy);
    transform-style: preserve-3d;
    will-change: transform;
    transition: transform 0.15s ease-out;
  }

  .grid-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(199,125,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(199,125,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: gridPulse 8s ease-in-out infinite;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ─── DOT FIELD ─── */
  #dot-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ─── CURSOR ─── */
  #cursor {
    position: fixed;
    width: 36px; height: 36px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.05s linear;
    filter: drop-shadow(0 0 8px rgba(255,140,66,0.7));
  }

  .cursor-trail {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
  }

  /* ─── MAIN CONTENT ─── */
  .scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .pochacco-blob {
    position: relative;
    width: 130px; height: 130px;
    margin-bottom: 28px;
  }

  .blob-body {
    width: 130px; height: 110px;
    background: var(--cream);
    border-radius: 50% 50% 45% 45%;
    position: absolute;
    bottom: 0;
    box-shadow:
      0 0 30px rgba(255,245,230,0.2),
      0 0 60px rgba(255,213,180,0.1);
  }

  .blob-ear {
    width: 38px; height: 46px;
    background: var(--cream);
    border-radius: 50% 50% 0 0;
    position: absolute;
    top: 0;
  }
  .blob-ear.left  { left: 14px; transform: rotate(-8deg); }
  .blob-ear.right { right: 14px; transform: rotate(8deg); }

  .blob-ear-inner {
    width: 20px; height: 28px;
    background: #FFB5C8;
    border-radius: 50% 50% 0 0;
    position: absolute;
    top: 8px; left: 9px;
  }

  .blob-eye {
    width: 14px; height: 16px;
    background: #2a1a3a;
    border-radius: 50%;
    position: absolute;
    top: 46px;
  }
  .blob-eye.left  { left: 32px; }
  .blob-eye.right { right: 32px; }
  .blob-eye::after {
    content: '';
    width: 5px; height: 5px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 2px; right: 2px;
  }

  .blob-nose {
    width: 10px; height: 7px;
    background: #FFB5C8;
    border-radius: 50%;
    position: absolute;
    top: 62px; left: 60px;
  }

  .blob-cheek {
    width: 18px; height: 10px;
    background: rgba(255,181,200,0.55);
    border-radius: 50%;
    position: absolute;
    top: 68px;
  }
  .blob-cheek.left  { left: 18px; }
  .blob-cheek.right { right: 18px; }

  /* clementine in paw */
  .blob-paw {
    width: 26px; height: 22px;
    background: var(--cream);
    border-radius: 40% 40% 50% 50%;
    position: absolute;
    bottom: -6px; right: 14px;
  }
  .paw-clementine {
    width: 20px; height: 20px;
    position: absolute;
    bottom: 14px; right: 8px;
    font-size: 20px;
    filter: drop-shadow(0 2px 6px rgba(255,140,66,0.6));
    animation: bobble 3s ease-in-out infinite;
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-5px) rotate(5deg); }
  }

  /* floating paw prints */
  .paw-float {
    position: fixed;
    font-size: 22px;
    opacity: 0;
    pointer-events: none;
    animation: floatPaw 12s ease-in-out infinite;
    z-index: 5;
  }

  @keyframes floatPaw {
    0% { opacity: 0; transform: translateY(0) scale(0.7); }
    15% { opacity: 0.35; }
    85% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-120px) scale(1.1); }
  }

  /* ─── TYPOGRAPHY ─── */
  .title {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--orange-glow) 0%, var(--fuchsia) 50%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 20px rgba(255,140,66,0.35));
  }

  .tagline {
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    font-weight: 400;
    color: rgba(255,245,230,0.72);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .tagline-sub {
    font-size: 0.82rem;
    color: rgba(199,125,255,0.55);
    letter-spacing: 0.12em;
  }

  /* ─── CLICK BURST ─── */
  .burst-slice {
    position: fixed;
    font-size: 18px;
    pointer-events: none;
    z-index: 9990;
    animation: burstFly 0.7s ease-out forwards;
  }

  @keyframes burstFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }

  /* ─── POCHACCO SPARKLE RING ─── */
  .sparkle-ring {
    position: absolute;
    width: 170px; height: 170px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: -1;
  }

  .sparkle-dot {
    position: absolute;
    border-radius: 50%;
    animation: sparkleOrbit 4s linear infinite;
  }

  @keyframes sparkleOrbit {
    from { transform: rotate(var(--start)) translateX(68px); }
    to   { transform: rotate(calc(var(--start) + 360deg)) translateX(68px); }
  }
</style>
</head>
<body>

<!-- Infinity bg -->
<div class="infinity-bg">
  <div class="mirror-layer" id="mirrorLayer">
    <div class="grid-lines"></div>
  </div>
</div>

<!-- Dot canvas -->
<canvas id="dot-canvas"></canvas>

<!-- Custom cursor -->
<div id="cursor">
  <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <!-- leaf -->
    <ellipse cx="22" cy="6" rx="6" ry="3.5" fill="#5DC64A" transform="rotate(-30 22 6)"/>
    <line x1="19" y1="7" x2="23" y2="11" stroke="#3a9a2a" stroke-width="1"/>
    <!-- clementine body -->
    <circle cx="18" cy="21" r="13" fill="#FF8C42"/>
    <!-- segments -->
    <line x1="18" y1="8" x2="18" y2="34" stroke="#E56B1F" stroke-width="0.8" opacity="0.5"/>
    <line x1="5" y1="21" x2="31" y2="21" stroke="#E56B1F" stroke-width="0.8" opacity="0.5"/>
    <line x1="8.9" y1="12" x2="27.1" y2="30" stroke="#E56B1F" stroke-width="0.8" opacity="0.5"/>
    <line x1="27.1" y1="12" x2="8.9" y2="30" stroke="#E56B1F" stroke-width="0.8" opacity="0.5"/>
    <!-- shine -->
    <ellipse cx="13" cy="16" rx="3.5" ry="2" fill="rgba(255,255,220,0.35)" transform="rotate(-25 13 16)"/>
  </svg>
</div>

<!-- Main scene -->
<div class="scene">

  <!-- Pochacco blob with sparkle ring -->
  <div style="position:relative; display:inline-block; margin-bottom:28px;">
    <div class="pochacco-blob">
      <div class="blob-ear left"><div class="blob-ear-inner"></div></div>
      <div class="blob-ear right"><div class="blob-ear-inner"></div></div>
      <div class="blob-body">
        <div class="blob-eye left"></div>
        <div class="blob-eye right"></div>
        <div class="blob-nose"></div>
        <div class="blob-cheek left"></div>
        <div class="blob-cheek right"></div>
        <div class="blob-paw"></div>
      </div>
    </div>
    <div class="paw-clementine">🍊</div>

    <!-- sparkle orbit ring -->
    <div class="sparkle-ring" id="sparkleRing"></div>
  </div>

  <h1 class="title"Sascha PS Tejada</h1>
</div>

<!-- Floating paw prints (positioned by JS) -->

<script>
// ─── CURSOR TRACKING ───
const cursor = document.getElementById('cursor');
const trails = [];
const TRAIL_COUNT = 10;
const mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

for (let i = 0; i < TRAIL_COUNT; i++) {
  const t = document.createElement('div');
  t.className = 'cursor-trail';
  const s = (1 - i/TRAIL_COUNT);
  const size = 6 + s * 10;
  t.style.cssText = `width:${size}px;height:${size}px;opacity:${s*0.6};
    background:radial-gradient(circle, ${i%2===0?'#FF8C42':'#FF6EB4'}, transparent);`;
  document.body.appendChild(t);
  trails.push({ el: t, x: mouse.x, y: mouse.y });
}

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function animateTrails() {
  cursor.style.left = mouse.x + 'px';
  cursor.style.top  = mouse.y + 'px';
  let px = mouse.x, py = mouse.y;
  trails.forEach((t, i) => {
    const lag = 0.18 + i * 0.05;
    t.x += (px - t.x) * lag;
    t.y += (py - t.y) * lag;
    t.el.style.left = t.x + 'px';
    t.el.style.top  = t.y + 'px';
    px = t.x; py = t.y;
  });
  requestAnimationFrame(animateTrails);
}
animateTrails();

// ─── PARALLAX MIRROR ───
const mirror = document.getElementById('mirrorLayer');
document.addEventListener('mousemove', e => {
  const nx = (e.clientX / window.innerWidth  - 0.5) * 2;
  const ny = (e.clientY / window.innerHeight - 0.5) * 2;
  mirror.style.transform = `rotateY(${nx*6}deg) rotateX(${-ny*6}deg) translateZ(0)`;
});

// ─── DOT FIELD ───
const canvas = document.getElementById('dot-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#FF8C42','#FF6EB4','#C77DFF','#FFD6E8','#B8E0FF','#FFB347'];
const dots = [];
const DOT_COUNT = 120;

for (let i = 0; i < DOT_COUNT; i++) {
  dots.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    baseX: 0, baseY: 0,
    r: 2 + Math.random() * 10,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    alpha: 0.15 + Math.random() * 0.5,
    speed: 0.1 + Math.random() * 0.3,
    angle: Math.random() * Math.PI * 2,
    bloomTimer: Math.random() * 200,
    blooming: false,
    bloomScale: 1,
    vx: 0, vy: 0
  });
  dots[i].baseX = dots[i].x;
  dots[i].baseY = dots[i].y;
}

let frame = 0;
function drawDots() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;

  dots.forEach(d => {
    // Drift
    d.angle += 0.003 * d.speed;
    d.baseX += Math.cos(d.angle) * d.speed * 0.4;
    d.baseY += Math.sin(d.angle) * d.speed * 0.4;

    // Wrap
    if (d.baseX < -20) d.baseX = canvas.width + 20;
    if (d.baseX > canvas.width + 20) d.baseX = -20;
    if (d.baseY < -20) d.baseY = canvas.height + 20;
    if (d.baseY > canvas.height + 20) d.baseY = -20;

    // Repel from cursor
    const dx = d.baseX - mouse.x;
    const dy = d.baseY - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const repelRadius = 120;
    if (dist < repelRadius) {
      const force = (repelRadius - dist) / repelRadius;
      d.vx += (dx / dist) * force * 2.5;
      d.vy += (dy / dist) * force * 2.5;
    }
    d.vx *= 0.88;
    d.vy *= 0.88;
    d.x = d.baseX + d.vx;
    d.y = d.baseY + d.vy;

    // Bloom
    d.bloomTimer--;
    if (d.bloomTimer <= 0) {
      d.blooming = true;
      d.bloomTimer = 150 + Math.random() * 300;
      d.bloomPhase = 0;
    }
    if (d.blooming) {
      d.bloomPhase = (d.bloomPhase || 0) + 0.04;
      d.bloomScale = 1 + Math.sin(d.bloomPhase) * 2.5;
      if (d.bloomPhase >= Math.PI) {
        d.blooming = false;
        d.bloomScale = 1;
      }
    }

    const scale = d.blooming ? d.bloomScale : 1;
    const alpha = d.blooming ? d.alpha * (1 - d.bloomPhase/Math.PI * 0.5) : d.alpha;

    // Glow
    const grd = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r * scale * 2.5);
    grd.addColorStop(0, d.color + 'CC');
    grd.addColorStop(0.5, d.color + '55');
    grd.addColorStop(1, d.color + '00');
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r * scale * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.globalAlpha = alpha * 0.5;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r * scale, 0, Math.PI * 2);
    ctx.fillStyle = d.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  requestAnimationFrame(drawDots);
}
drawDots();

// ─── CLICK BURST ───
document.addEventListener('click', e => {
  const emojis = ['🍊','🍋','✦','˚','·'];
  const count = 12;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'burst-slice';
    el.textContent = emojis[i % emojis.length];
    const angle = (i / count) * Math.PI * 2;
    const dist  = 60 + Math.random() * 80;
    el.style.left = e.clientX + 'px';
    el.style.top  = e.clientY + 'px';
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    el.style.fontSize = (12 + Math.random() * 14) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }

  // shockwave on dot field (push away)
  dots.forEach(d => {
    const dx = d.baseX - e.clientX;
    const dy = d.baseY - e.clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 200) {
      const force = (200 - dist) / 200 * 8;
      d.vx += (dx / dist) * force;
      d.vy += (dy / dist) * force;
    }
  });
});

// ─── SPARKLE ORBIT RING ───
const ring = document.getElementById('sparkleRing');
const ringColors = ['#FF8C42','#FF6EB4','#C77DFF','#FFD6E8','#B8E0FF'];
for (let i = 0; i < 8; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle-dot';
  const size = 4 + (i % 3) * 3;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    background:${ringColors[i % ringColors.length]};
    top:50%; left:50%;
    margin-top:-${size/2}px; margin-left:-${size/2}px;
    --start:${i * 45}deg;
    animation-delay:${-i * 0.5}s;
    box-shadow: 0 0 6px ${ringColors[i % ringColors.length]}99;
  `;
  ring.appendChild(s);
}

// ─── FLOATING PAW PRINTS ───
const pawPositions = [
  { left: '8%',  top: '20%' },
  { left: '85%', top: '15%' },
  { left: '15%', top: '70%' },
  { left: '78%', top: '65%' },
  { left: '50%', top: '85%' },
  { left: '5%',  top: '45%' },
  { left: '92%', top: '40%' },
];

pawPositions.forEach((pos, i) => {
  const p = document.createElement('div');
  p.className = 'paw-float';
  p.textContent = '🐾';
  p.style.left = pos.left;
  p.style.top  = pos.top;
  p.style.animationDelay = (i * 1.7) + 's';
  p.style.animationDuration = (10 + i * 1.3) + 's';
  document.body.appendChild(p);
});
</script>
</body>
</html>
